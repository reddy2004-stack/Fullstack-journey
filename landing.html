<!DOCTYPE html>
<html>
<head>
  <title>Startup Landing Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Navbar */
    nav {
      background: #111;
      color: white;
      display: flex;
      justify-content: space-between;
      padding: 15px 40px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
    }

    /* Hero Section */
    .hero {
      height: 90vh;
      background: linear-gradient(to right, #007BFF, #00c6ff);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      flex-direction: column;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background: white;
      color: #007BFF;
      cursor: pointer;
    }

    .hero button:hover {
      background: #f0f0f0;
    }

    /* Features Section */
    .features {
      padding: 60px 20px;
      text-align: center;
    }

    .feature-box {
      display: inline-block;
      width: 250px;
      margin: 20px;
      padding: 20px;
      background: #f4f6f8;
      border-radius: 8px;
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

  <nav>
    <div>MyStartup</div>
    <div>
      <a href="#">Home</a>
      <a href="#">Features</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Build Something Amazing</h1>
    <p>Learn Web Development & AI step by step.</p>
    <button>Get Started</button>
  </section>

  <section class="features">
    <h2>Features</h2>

    <div class="feature-box">
      <h3>Fast</h3>
      <p>Optimized and clean design.</p>
    </div>

    <div class="feature-box">
      <h3>Responsive</h3>
      <p>Works on all devices.</p>
    </div>

    <div class="feature-box">
      <h3>Modern</h3>
      <p>Clean UI and smooth experience.</p>
    </div>

  </section>

  <footer>
    © 2026 MyStartup. All rights reserved.
  </footer>

</body>
</html>
